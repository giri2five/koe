<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Koe</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="noise-layer"></div>

  <main class="app-window">

    <!-- Header -->
    <header class="app-header">
      <div class="brand-lockup">
        <div class="brand-mark" aria-hidden="true">
          <span></span><span></span>
        </div>
        <div class="brand-text">
          <p class="brand-name">Koe 声</p>
          <p class="brand-sub">Voice to text, on device</p>
        </div>
      </div>
      <div class="header-right">
        <span class="pill status-pill" id="status-pill">Ready</span>
        <span class="pill hotkey-pill" id="hotkey-pill">ALT&nbsp;+&nbsp;K</span>
        <button class="btn-primary" id="hide-btn">Hide to tray</button>
      </div>
    </header>

    <div class="app-body">

      <!-- Left column -->
      <div class="main-col">

        <!-- Status card -->
        <article class="card status-card" id="status-card" data-state="idle">
          <div class="status-inner">
            <div class="waveform" id="waveform" aria-hidden="true">
              <span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span>
            </div>
            <div class="status-text">
              <p class="status-label" id="status-label">Ready</p>
              <p class="status-sub" id="status-sub">Hold Alt + K to speak</p>
            </div>
          </div>
          <span class="state-badge" id="state-badge">Idle</span>
        </article>

        <!-- Last result -->
        <article class="card result-card">
          <div class="card-head">
            <p class="eyebrow">Last result</p>
            <div class="result-actions">
              <button class="btn-ghost sm" id="copy-result-btn">Copy</button>
              <button class="btn-ghost sm" id="clear-result-btn">Clear</button>
            </div>
          </div>
          <p class="result-text" id="last-cleaned">Nothing yet — hold Alt + K and speak.</p>
          <div class="result-meta">
            <span class="meta-tag" id="last-delivery"></span>
            <span class="meta-tag" id="last-duration"></span>
          </div>
        </article>

        <!-- History -->
        <article class="card history-card">
          <div class="card-head">
            <p class="eyebrow">History</p>
            <button class="btn-ghost sm" id="clear-history-btn">Clear all</button>
          </div>
          <div class="history-list" id="history-list">
            <p class="history-empty">Your recent dictations will appear here.</p>
          </div>
        </article>

      </div>

      <!-- Right column: settings -->
      <aside class="side-col">
        <article class="card settings-card">
          <p class="eyebrow">Settings</p>

          <button class="setting-row" id="mic-setting">
            <div class="setting-info">
              <span class="setting-label">Microphone</span>
              <strong id="mic-value">System default</strong>
            </div>
            <svg class="chevron" viewBox="0 0 16 16" fill="none">
              <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <button class="setting-row" id="output-setting">
            <div class="setting-info">
              <span class="setting-label">Output mode</span>
              <strong id="output-value">Type and copy</strong>
            </div>
            <svg class="chevron" viewBox="0 0 16 16" fill="none">
              <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <div class="divider"></div>

          <button class="toggle-row" id="overlay-toggle">
            <div class="toggle-info">
              <strong>Recording overlay</strong>
              <span>Show pill indicator while speaking</span>
            </div>
            <div class="switch" id="overlay-switch"><span></span></div>
          </button>

          <button class="toggle-row" id="sound-toggle">
            <div class="toggle-info">
              <strong>Sound cues</strong>
              <span>Subtle audio on start and stop</span>
            </div>
            <div class="switch" id="sound-switch"><span></span></div>
          </button>

          <div class="divider"></div>

          <div class="info-row">
            <span class="setting-label">Model</span>
            <span class="info-value" id="model-value">small.en</span>
          </div>
          <div class="info-row">
            <span class="setting-label">Runtime</span>
            <span class="info-value" id="runtime-value">On-device</span>
          </div>
          <div class="info-row">
            <span class="setting-label">Config</span>
            <span class="info-value">~/.koe/config.toml</span>
          </div>

        </article>
      </aside>

    </div><!-- /app-body -->

  </main>

  <!-- Option sheet -->
  <div class="sheet is-hidden" id="option-sheet" aria-hidden="true">
    <div class="sheet-backdrop" id="sheet-backdrop"></div>
    <div class="sheet-panel">
      <p class="eyebrow" id="sheet-eyebrow">Select</p>
      <h3 class="sheet-title" id="sheet-title">Choose an option</h3>
      <div class="option-list" id="option-list"></div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
