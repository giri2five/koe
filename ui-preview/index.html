<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Koe</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <div class="shell">

    <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
    <aside class="sidebar">

      <div class="sidebar-brand">
        <div class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 22 22" fill="none">
            <rect x="1" y="1" width="20" height="20" rx="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <path d="M11 5.5a2.5 2.5 0 0 1 2.5 2.5v3a2.5 2.5 0 0 1-5 0V8A2.5 2.5 0 0 1 11 5.5z" fill="rgba(255,255,255,0.9)"/>
            <path d="M7 10v1a4 4 0 0 0 8 0v-1" stroke="rgba(255,255,255,0.7)" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="11" y1="15" x2="11" y2="17" stroke="rgba(255,255,255,0.5)" stroke-width="1.4" stroke-linecap="round"/>
            <line x1="8.5" y1="17" x2="13.5" y2="17" stroke="rgba(255,255,255,0.5)" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">Koe 声</div>
          <div class="brand-sub">Voice to text, on device</div>
        </div>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-section-label">Input / Output</p>

        <button class="sidebar-row" id="mic-setting">
          <span class="sidebar-row-label">Microphone</span>
          <span class="sidebar-row-value" id="mic-value">System default</span>
          <svg class="sidebar-chevron" viewBox="0 0 12 12" fill="none">
            <path d="M4.5 3l3 3-3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <button class="sidebar-row" id="output-setting">
          <span class="sidebar-row-label">Output mode</span>
          <span class="sidebar-row-value" id="output-value">Type and copy</span>
          <svg class="sidebar-chevron" viewBox="0 0 12 12" fill="none">
            <path d="M4.5 3l3 3-3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-section-label">Preferences</p>

        <button class="sidebar-toggle" id="overlay-toggle">
          <span class="sidebar-row-label">Recording overlay</span>
          <div class="switch" id="overlay-switch"><span></span></div>
        </button>

        <button class="sidebar-toggle" id="sound-toggle">
          <span class="sidebar-row-label">Sound cues</span>
          <div class="switch" id="sound-switch"><span></span></div>
        </button>
      </div>

      <div class="sidebar-meta">
        <div class="meta-pair"><span>Model</span><span id="model-value">small.en</span></div>
        <div class="meta-pair"><span>Runtime</span><span>On-device · Private</span></div>
        <div class="meta-pair"><span>Hotkey</span><span id="hotkey-pill">ALT + K</span></div>
      </div>

      <div class="sidebar-actions">
        <button class="btn-tray" id="hide-btn">Hide to tray</button>
      </div>

    </aside>

    <!-- ── Main ─────────────────────────────────────────────────────────── -->
    <main class="main">

      <!-- Status hero -->
      <div class="status-hero" id="status-card" data-state="idle">
        <div class="status-vis" aria-hidden="true">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
        <div>
          <p class="status-headline" id="status-label">Ready</p>
          <p class="status-hint" id="status-sub">Hold Alt + K to speak</p>
        </div>
        <span class="status-badge" id="state-badge">Idle</span>
      </div>

      <!-- Last result -->
      <div class="panel" id="result-panel">
        <div class="panel-head">
          <span class="panel-label">Last result</span>
          <div class="panel-actions">
            <button class="btn-ghost" id="copy-result-btn">Copy</button>
            <button class="btn-ghost" id="clear-result-btn">Clear</button>
          </div>
        </div>
        <p class="result-body" id="last-cleaned">Hold Alt + K and speak — your text appears here.</p>
        <div class="result-chips">
          <span class="chip" id="last-delivery"></span>
          <span class="chip" id="last-duration"></span>
        </div>
      </div>

      <!-- History -->
      <div class="panel" id="history-panel">
        <div class="panel-head">
          <span class="panel-label">History</span>
          <button class="btn-ghost" id="clear-history-btn">Clear all</button>
        </div>
        <div class="history-list" id="history-list">
          <p class="empty-hint">Your recent dictations will appear here.</p>
        </div>
      </div>

    </main>
  </div>

  <!-- Option sheet (microphone / output picker) -->
  <div class="sheet is-hidden" id="option-sheet" aria-hidden="true">
    <div class="sheet-scrim" id="sheet-backdrop"></div>
    <div class="sheet-panel">
      <p class="sheet-eyebrow" id="sheet-eyebrow">Choose</p>
      <h3 class="sheet-title" id="sheet-title">Select option</h3>
      <div class="option-list" id="option-list"></div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
